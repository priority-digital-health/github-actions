name: UI Review - Update Jira

# Reusable workflow called by UI repo review caller files after deployment and tests.
# Centralises all Jira update logic in one place:
#
#   1. Extract Jira ticket number from branch name
#   2. Post a deduplicated deployment comment listing all review URLs
#   3. Set customfield_10085 (HeroCoders checklist, extracted from PR "How to test" section)
#   4. Set customfield_10154 (description ADF from PR body)
#   5. Set customfield_10050 (review URL field)
#
# PR body is read from the GitHub event context via environment variables
# rather than interpolated directly into scripts, preventing script injection.
#
# STANDARD CALLER EXAMPLE
# ------------------------
# jobs:
#   update_jira:
#     needs: [test, review]
#     uses: priority-digital-health/github-actions/.github/workflows/ui-update-jira.yml@main
#     with:
#       review_url: ${{ needs.review.outputs.review_url }}
#     secrets: inherit
#
# WITH EXTRA COMMENT INFO (e.g. platform-ui backend details)
# -----------------------------------------------------------
# jobs:
#   update_jira:
#     needs: [test, review]
#     uses: priority-digital-health/github-actions/.github/workflows/ui-update-jira.yml@main
#     with:
#       review_url: ${{ needs.review.outputs.review_url }}
#       jira_comment_suffix: "🖥️ Backend: ${{ needs.review.outputs.backend_environment }} (${{ needs.review.outputs.backend_url }})"
#     secrets: inherit

on:
  workflow_call:
    inputs:

      review_url:
        description: >
          The review URL from the deploy job (needs.review.outputs.review_url).
          Written to customfield_10050 and used as a fallback in the comment
          when no review-url-*.json artifacts are present.
        required: false
        type: string
        default: ''

      jira_comment_suffix:
        description: >
          Optional extra text appended to the deployment comment on a new line.
          Use for additional context such as backend environment info.
          Example: "🖥️ Backend: staging (https://api.staging.example.com)"
        required: false
        type: string
        default: ''

    secrets:
      JIRA_BASE_URL:
        description: 'Jira base URL (e.g. https://yourorg.atlassian.net)'
        required: false
      JIRA_USER_EMAIL:
        description: 'Jira user email for API authentication'
        required: false
      JIRA_API_TOKEN:
        description: 'Jira API token for authentication'
        required: false

jobs:
  update_jira:
    runs-on: ubuntu-latest
    steps:
      # -- Extract ticket number from branch name --------------------------------
      - name: Find Jira ticket in branch name
        id: jira_ticket
        run: |
          TICKET=$(echo "${{ github.head_ref }}" | grep -oE '[A-Z]+-[0-9]+' || echo '')
          echo "TICKET=$TICKET" >> $GITHUB_OUTPUT

      - name: Login to Jira
        if: steps.jira_ticket.outputs.TICKET != ''
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # -- Build and post deployment comment ------------------------------------
      # Deduplicated: only posts if no existing "Review environment deployed" comment.
      - name: Check for existing deployment comment
        if: steps.jira_ticket.outputs.TICKET != ''
        id: check_comment
        run: |
          COMMENT_COUNT=$(curl -s \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.jira_ticket.outputs.TICKET }}/comment" \
            | grep -c "Review environment deployed" || true)
          [ -z "$COMMENT_COUNT" ] && COMMENT_COUNT=0
          echo "COMMENT_EXISTS=$COMMENT_COUNT" >> $GITHUB_OUTPUT

      # Download review-url-*.json artifacts uploaded by ui-review.yml.
      # Works for both single-contract and multi-contract repos.
      # continue-on-error: true so the comment still posts if no artifacts exist.
      - name: Download review URL artifacts
        if: steps.jira_ticket.outputs.TICKET != ''
        uses: actions/download-artifact@v4
        with:
          pattern: review-url-*
          merge-multiple: true
          path: review-urls
        continue-on-error: true

      - name: Build deployment comment
        if: steps.jira_ticket.outputs.TICKET != ''
        id: build_comment
        env:
          REVIEW_URL: ${{ inputs.review_url }}
          COMMENT_SUFFIX: ${{ inputs.jira_comment_suffix }}
        run: |
          {
            echo "COMMENT<<EOF"
            echo "✅ Review environment deployed and tests passed!"
            echo ""
            # List URLs from per-contract artifacts (single or multi-contract)
            if ls review-urls/review-url-*.json 2>/dev/null | head -1 | grep -q .; then
              for f in review-urls/review-url-*.json; do
                [ -e "$f" ] || continue
                CONTRACT=$(jq -r '.contract' "$f")
                URL=$(jq -r '.url' "$f")
                if [ "$CONTRACT" = "no-contract" ]; then
                  echo "🔗 URL: $URL"
                else
                  echo "- $CONTRACT: $URL"
                fi
              done
            elif [ -n "$REVIEW_URL" ]; then
              echo "🔗 URL: $REVIEW_URL"
            fi
            if [ -n "$COMMENT_SUFFIX" ]; then
              echo ""
              echo "$COMMENT_SUFFIX"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Comment on Jira ticket
        if: steps.jira_ticket.outputs.TICKET != '' && steps.check_comment.outputs.COMMENT_EXISTS == '0'
        uses: atlassian/gajira-comment@v3
        with:
          issue: ${{ steps.jira_ticket.outputs.TICKET }}
          comment: ${{ steps.build_comment.outputs.COMMENT }}

      # -- Update Jira fields ---------------------------------------------------
      - name: Extract How to test checklist
        id: extract_checklist
        if: steps.jira_ticket.outputs.TICKET != ''
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          CHECKLIST=$(printf '%s' "$PR_BODY" | awk '/### How to test/{flag=1;next}/^### /{flag=0}flag' | grep '^- \[ \]' | sed 's/^- \[ \] //')
          CHECKLIST_TEXT=$(printf '%s\n' "$CHECKLIST" | sed 's/^/* [ ] /')
          echo "checklist_text<<EOF" >> $GITHUB_OUTPUT
          echo "$CHECKLIST_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update Jira fields
        if: steps.jira_ticket.outputs.TICKET != ''
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          REVIEW_URL: ${{ inputs.review_url }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          TICKET: ${{ steps.jira_ticket.outputs.TICKET }}
          CHECKLIST_TEXT: ${{ steps.extract_checklist.outputs.checklist_text }}
        run: |
          AUTH="${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}"

          # customfield_10085 – HeroCoders checklist (Jira API v2)
          DATA=$(jq -n --arg text "$CHECKLIST_TEXT" '{fields: {"customfield_10085": $text}}')
          curl -s -X PUT \
            -H "Content-Type: application/json" \
            -u "$AUTH" \
            "${JIRA_BASE_URL}/rest/api/2/issue/${TICKET}" \
            -d "$DATA"

          # customfield_10154 (description ADF) + customfield_10050 (review URL) – Jira API v3
          # PR body is read via os.environ to avoid script injection.
          DATA=$(python3 - <<'PYEOF'
          import json, os, re
          pr_body = os.environ["PR_BODY"]
          review_url = os.environ["REVIEW_URL"]
          pr_body_cleaned = re.sub(r'### How to test.*?(?=\n### |\Z)', '', pr_body, flags=re.DOTALL).strip()
          adf = {
              'version': 1, 'type': 'doc',
              'content': [{'type': 'paragraph', 'content': [{'type': 'text', 'text': pr_body_cleaned}]}]
          }
          fields = {'customfield_10154': adf}
          if review_url:
              fields['customfield_10050'] = review_url
          print(json.dumps({'fields': fields}))
          PYEOF
          )
          STATUS=$(curl -sS -o /tmp/jira_update.json -w "%{http_code}" -X PUT \
            -H "Content-Type: application/json" \
            -u "$AUTH" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET}" \
            -d "$DATA")
          [ "$STATUS" -ge 400 ] \
            && echo "::warning::Jira field update failed (HTTP $STATUS)" \
            && cat /tmp/jira_update.json \
            || echo "Jira fields updated."

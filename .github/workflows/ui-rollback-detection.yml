name: Post-Deployment Rollback Detection

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        description: 'Environment name (review, staging, production)'
      health_check_url:
        type: string
        required: true
        description: 'URL to health check endpoint'
      rollback_enabled:
        type: boolean
        default: false
        description: 'Automatically trigger rollback on failure'
      max_retries:
        type: number
        default: 3
        description: 'Number of health check retries'
      retry_delay:
        type: number
        default: 10
        description: 'Delay between retries in seconds'

    outputs:
      deployment_healthy:
        description: 'Whether deployment passed health checks'
        value: ${{ jobs.health_check.outputs.deployment_healthy }}
      rollback_triggered:
        description: 'Whether rollback was triggered'
        value: ${{ jobs.health_check.outputs.rollback_triggered }}

jobs:
  health_check:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    outputs:
      deployment_healthy: ${{ steps.check_health.outputs.deployment_healthy }}
      rollback_triggered: ${{ steps.rollback.outputs.rollback_triggered }}

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 15
        shell: bash

      - name: Check deployment health
        id: check_health
        run: |
          HEALTH_URL="${{ inputs.health_check_url }}"
          MAX_RETRIES="${{ inputs.max_retries }}"
          RETRY_DELAY="${{ inputs.retry_delay }}"
          
          echo "Checking health of deployment at: $HEALTH_URL"
          
          for attempt in $(seq 1 "$MAX_RETRIES"); do
            echo "Health check attempt $attempt/$MAX_RETRIES..."
            
            RESPONSE=$(curl -s -w "\n%{http_code}" "$HEALTH_URL" || echo -e "\nfail:000")
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)
            
            echo "HTTP Status: $HTTP_CODE"
            
            # Accept 200-299 as healthy
            if [[ "$HTTP_CODE" =~ ^2[0-9]{2}$ ]]; then
              echo "✅ Deployment health check passed"
              echo "deployment_healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            if [ $attempt -lt "$MAX_RETRIES" ]; then
              echo "⏳ Waiting ${RETRY_DELAY}s before retry..."
              sleep "$RETRY_DELAY"
            fi
          done
          
          echo "❌ Deployment health check failed after $MAX_RETRIES attempts"
          echo "deployment_healthy=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Trigger rollback if enabled
        if: ${{ failure() && inputs.rollback_enabled }}
        id: rollback
        run: |
          echo "🔄 Rollback enabled — triggering rollback workflow..."
          echo "rollback_triggered=true" >> $GITHUB_OUTPUT
          
          # In production, this would trigger a workflow dispatch to ui-rollback.yml
          # For now, we just report the trigger
          echo "Rollback would trigger: priority-digital-health/github-actions/.github/workflows/ui-rollback.yml"

      - name: Report deployment status
        if: always()
        run: |
          HEALTH_STATUS="${{ steps.check_health.outputs.deployment_healthy }}"
          ROLLBACK_TRIGGERED="${{ steps.rollback.outputs.rollback_triggered }}"
          
          echo "## 🚀 Post-Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | $HEALTH_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Rollback Triggered | $ROLLBACK_TRIGGERED |" >> $GITHUB_STEP_SUMMARY

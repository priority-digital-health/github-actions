name: Reusable Test Report Consolidator

# Posts a consolidated test report as a PR comment combining results from multiple test jobs
# (Playwright, unit tests, etc.).
#
# Usage:
#   report_tests:
#     if: always()
#     needs: [test_playwright, test_unit]
#     uses: priority-digital-health/github-actions/.github/workflows/ui-report-tests.yml@main
#     with:
#       playwright_results: ${{ needs.test_playwright.outputs.results_json || '{}' }}
#       playwright_coverage: ${{ needs.test_playwright.outputs.coverage_percent || '' }}
#       unit_results: ${{ needs.test_unit.outputs.results_json || '{}' }}
#       unit_coverage: ${{ needs.test_unit.outputs.coverage_percent || '' }}

on:
  workflow_call:
    inputs:
      playwright_results:
        type: string
        description: 'Playwright test results JSON'
        required: false
        default: ''
      playwright_coverage:
        type: string
        description: 'Playwright coverage percentage'
        required: false
        default: ''
      unit_results:
        type: string
        description: 'Unit test results JSON'
        required: false
        default: ''
      unit_coverage:
        type: string
        description: 'Unit test coverage percentage'
        required: false
        default: ''
      post_comment:
        type: boolean
        description: 'Post comment to PR'
        required: false
        default: true

jobs:
  report:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Check if results provided
        id: check
        run: |
          if [ -z "${{ inputs.playwright_results }}" ] && [ -z "${{ inputs.unit_results }}" ]; then
            echo "No test results provided"
            exit 1
          fi

      - name: Generate Playwright report
        if: inputs.playwright_results != ''
        uses: priority-digital-health/github-actions/.github/actions/test-report@main
        id: playwright_report
        with:
          test_type: '🎭 Playwright Tests'
          results_json: ${{ inputs.playwright_results }}
          coverage_percent: ${{ inputs.playwright_coverage }}

      - name: Generate Unit test report
        if: inputs.unit_results != ''
        uses: priority-digital-health/github-actions/.github/actions/test-report@main
        id: unit_report
        with:
          test_type: '📦 Unit Tests'
          results_json: ${{ inputs.unit_results }}
          coverage_percent: ${{ inputs.unit_coverage }}

      - name: Build consolidated comment
        id: consolidate
        run: |
          {
            echo "## ✨ Test Results"
            echo ""
            
            if [ -n "${{ steps.playwright_report.outputs.report_markdown }}" ]; then
              echo "${{ steps.playwright_report.outputs.report_markdown }}"
            fi
            
            if [ -n "${{ steps.unit_report.outputs.report_markdown }}" ]; then
              echo "${{ steps.unit_report.outputs.report_markdown }}"
            fi
            
            echo "---"
            echo "_Report generated by [UI Test Workflows](../../.github/workflows/ui-test-*.yml)_"
          } > /tmp/comment.md
          
          COMMENT=$(cat /tmp/comment.md)
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment to PR
        if: ${{ inputs.post_comment }}
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.consolidate.outputs.comment }}`
            })
